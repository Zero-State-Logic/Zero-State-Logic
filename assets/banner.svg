<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Faysal Ali Shah — Electrical Engineer">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#11161f"/>
      <stop offset="100%" stop-color="#0a0d13"/>
    </linearGradient>
    <linearGradient id="namegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffce6b"/>
      <stop offset="50%" stop-color="#e8923a"/>
      <stop offset="100%" stop-color="#ff7a45"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#52c97a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#52c97a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#52c97a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd166" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>

  <!-- background -->
  <rect width="900" height="240" rx="16" fill="url(#bgg)"/>

  <!-- faint dot grid -->
  <g fill="#1d2530">
    <!-- generated grid of dots -->
    <g id="dots"></g>
  </g>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.1" fill="#1b2230"/>
  </pattern>
  <rect width="900" height="240" rx="16" fill="url(#grid)" opacity="0.7"/>

  <!-- ===== animated ECG / oscilloscope trace across the middle ===== -->
  <!-- baseline -->
  <line x1="0" y1="168" x2="900" y2="168" stroke="#1f2937" stroke-width="1.5"/>

  <!-- the signal path (repeats an ECG-ish beat) -->
  <path id="wave"
    d="M0,168 L138,168 L140,168 L168,138 L160,198 L170,168 L228,168 L225,168 L235,113 L245,228 L255,168 L300,150
       L420,168 L435,168 L445,138 L455,198 L465,168 L505,168 L520,168 L530,113 L540,228 L550,168 L600,150
       L720,168 L735,168 L745,138 L755,198 L765,168 L805,168 L820,168 L830,113 L840,228 L850,168 L900,168"
    fill="none" stroke="#2c3a2f" stroke-width="2"/>

  <!-- bright animated overlay that "scans" the wave -->
  <path
    d="M0,168 L138,168 L140,168 L168,138 L160,198 L170,168 L228,168 L225,168 L235,113 L245,228 L255,168 L300,150
       L420,168 L435,168 L445,138 L455,198 L465,168 L505,168 L520,168 L530,113 L540,228 L550,168 L600,150
       L720,168 L735,168 L745,138 L755,198 L765,168 L805,168 L820,168 L830,113 L840,228 L850,168 L900,168"
    fill="none" stroke="#52c97a" stroke-width="2.6" stroke-linecap="round"
    stroke-dasharray="1800" stroke-dashoffset="1800">
    <animate attributeName="stroke-dashoffset" from="1800" to="0" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- glowing scanner dot riding the wave -->
  <circle r="16" fill="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M0,168 L138,168 L140,168 L168,138 L160,198 L170,168 L228,168 L225,168 L235,113 L245,228 L255,168 L300,168 L420,168 L435,168 L445,138 L455,198 L465,168 L505,168 L520,168 L530,113 L540,228 L550,168 L600,168 L720,168 L735,168 L745,138 L755,198 L765,168 L805,168 L820,168 L830,113 L840,228 L850,168 L900,168"/>
  </circle>
  <circle r="3.5" fill="#fff">
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M0,168 L138,168 L140,168 L168,138 L160,198 L170,168 L228,168 L225,168 L235,113 L245,228 L255,168 L300,168 L420,168 L435,168 L445,138 L455,198 L465,168 L505,168 L520,168 L530,113 L540,228 L550,168 L600,168 L720,168 L735,168 L745,138 L755,198 L765,168 L805,168 L820,168 L830,113 L840,228 L850,168 L900,168"/>
  </circle>

  <!-- ===== traveling data pulses on top bus lines ===== -->
  <g stroke="#23303f" stroke-width="1.5">
    <line x1="60" y1="40" x2="840" y2="40"/>
    <line x1="60" y1="58" x2="560" y2="58"/>
  </g>
  <circle r="3" fill="#e8923a">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M60,40 L840,40"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#52c97a">
    <animateMotion dur="3.4s" begin="0.6s" repeatCount="indefinite" path="M60,58 L560,58"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3.4s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== name + role ===== -->
  <text x="60" y="108" font-family="'Segoe UI',Verdana,sans-serif" font-size="46" font-weight="800"
        fill="url(#namegrad)" letter-spacing="1.5">FAYSAL ALI SHAH</text>

  <text x="62" y="135" font-family="'Consolas','Courier New',monospace" font-size="15.5" font-weight="600"
        fill="#9fb0c3" letter-spacing="2.5">ELECTRICAL ENGINEER
    <tspan fill="#e8923a"> · </tspan><tspan fill="#9fb0c3">NUST</tspan>
    <tspan fill="#e8923a"> · </tspan><tspan fill="#9fb0c3">ROBOTICS</tspan>
    <tspan fill="#e8923a"> · </tspan><tspan fill="#9fb0c3">EMBEDDED</tspan>
    <tspan fill="#e8923a"> · </tspan><tspan fill="#9fb0c3">ML</tspan>
  </text>

  <!-- blinking cursor -->
  <rect x="298" y="123" width="10" height="16" fill="#52c97a">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- corner status node -->
  <g transform="translate(820,205)">
    <circle r="5" fill="#52c97a">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="5" font-family="'Consolas',monospace" font-size="12" fill="#52c97a" text-anchor="end" transform="translate(-26,0)">SYSTEMS ONLINE</text>
  </g>

  <!-- thin accent frame -->
  <rect x="1" y="1" width="898" height="238" rx="16" fill="none" stroke="#e8923a" stroke-opacity="0.35" stroke-width="2"/>
</svg>
